<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Sub Thumbnail Template</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="sub-thumbnail-styles.css" />
  </head>
  <body>
    <div id="sub-canvas">
      <img id="sub-bg-base" alt="" />
      <div id="bg-wrap">
        <img id="sub-bg" alt="" />
        <div id="bg-fallback"></div>
      </div>
      <div id="sub-overlay"></div>
      <div id="section-number-wrap">
        <span id="section-number"></span>
      </div>
      <h2 id="section-title"></h2>
      <div id="phone-box">
        <span id="phone-text"></span>
      </div>
    </div>
  </body>
</html>
