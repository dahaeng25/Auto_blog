<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Thumbnail Template</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="thumbnail-canvas">
      <img id="thumbnail-base" alt="" />
      <div id="main-title-cover" class="text-zone-cover"></div>
      <div id="top-label-wrap">
        <div id="top-label-cover" class="text-zone-cover"></div>
        <div id="top-label-pill">
          <span id="thumbnail-top-label"></span>
        </div>
      </div>
      <h1 id="thumbnail-main-title"></h1>
    </div>
  </body>
</html>
