<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Thumbnail Template</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="thumbnail-canvas">
      <div id="thumbnail-photo"></div>
      <div id="thumbnail-overlay"></div>
      <div id="thumbnail-frame-inner"></div>
      <header id="thumbnail-header">
        <img id="thumbnail-header-logo" alt="" />
        <span id="thumbnail-company-name"></span>
      </header>
      <footer id="thumbnail-footer"></footer>
      <div id="text-area">
        <h1 id="thumbnail-text">썸네일 문구</h1>
        <p id="thumbnail-subtitle"></p>
      </div>
    </div>
  </body>
</html>
