<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Thumbnail Template</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="thumbnail-canvas">
      <div id="thumbnail-bg"></div>
      <div id="thumbnail-top-bar"></div>
      <div id="thumbnail-bottom-bar"></div>
      <img id="thumbnail-logo" alt="" />
      <div id="text-area">
        <div id="thumbnail-text-box">
          <h1 id="thumbnail-text">썸네일 문구</h1>
          <p id="thumbnail-subtitle"></p>
        </div>
      </div>
      <div id="thumbnail-accent"></div>
    </div>
  </body>
</html>
