<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thumbnail Template</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Playwright가 이 엘리먼트를 screenshot 합니다 -->
    <div id="thumbnail-canvas">
      <div class="logo-area">
        <div class="logo-mark">B</div>
        <span class="logo-text">Blog Orchestrator</span>
      </div>

      <div class="text-area">
        <h1 id="thumbnail-text">썸네일 텍스트</h1>
        <p id="thumbnail-subtitle"></p>
      </div>

      <div class="accent-line"></div>
    </div>
  </body>
</html>
