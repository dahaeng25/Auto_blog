services:
  blog-orchestrator:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - DEPLOYMENT_MODE=docker
      - ENABLE_WEB_SCHEDULER=true
      - PUBLISH_HEADLESS=true
      - ENABLE_NAVER_PUBLISH=true
      - ENABLE_TISTORY_PUBLISH=true
      - ENABLE_GOOGLE_PUBLISH=true
      - PORT=3000
    volumes:
      # 호스트 폴더 마운트 — auth:setup 세션·DB·출력물이 컨테이너 재시작 후에도 유지
      - ./auth:/app/auth
      - ./data:/app/data
      - ./output:/app/output
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
